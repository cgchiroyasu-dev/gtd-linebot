name: Monthly Repo Activity

# GitHub auto-disables scheduled workflows after 60 days of repo inactivity.
# This workflow creates a lightweight commit monthly to prevent that.

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update keepalive timestamp
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/.keepalive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/.keepalive
          git diff --cached --quiet || git commit -m "chore: monthly keepalive [skip ci]"
          git push
